<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0a0f16"/>
  <title>RoadCheck IRI</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    :root {
      --bg-deep: #0a0f16; --bg-card: rgba(18, 25, 35, 0.9);
      --accent: #f59e0b; --secondary: #3b82f6; --danger: #ef4444; --success: #10b981;
      --text: #e2e8f0; --border: rgba(255,255,255,0.1);
    }
    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
    body { font-family: 'Inter', sans-serif; background: var(--bg-deep); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
    
    .header { padding: 15px; text-align: center; border-bottom: 1px solid var(--border); }
    .header h1 { color: var(--accent); font-weight: 800; letter-spacing: 1px; font-size: 1.4rem; }

    .nav-tabs { display: flex; background: #121923; padding: 5px; }
    .nav-btn { flex: 1; padding: 10px; border: none; background: none; color: #94a3b8; font-weight: 600; font-size: 0.8rem; cursor: pointer; }
    .nav-btn.active { color: var(--accent); border-bottom: 2px solid var(--accent); }

    .screen { flex: 1; display: flex; flex-direction: column; overflow-y: auto; padding: 15px; gap: 15px; }
    .hidden { display: none !important; }

    .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .stat-card { background: var(--bg-card); padding: 12px; border-radius: 16px; border: 1px solid var(--border); text-align: center; }
    .stat-label { font-size: 0.6rem; text-transform: uppercase; color: #94a3b8; margin-bottom: 5px; }
    .stat-value { font-family: 'JetBrains Mono'; font-size: 1.6rem; color: var(--secondary); }
    .stat-value.corrected { color: var(--accent); }

    .map-box { height: 220px; border-radius: 16px; overflow: hidden; border: 1px solid var(--border); position: relative; }
    #mapMain { height: 100%; width: 100%; }

    .chart-box { background: var(--bg-card); height: 180px; border-radius: 16px; padding: 10px; border: 1px solid var(--border); }

    .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .btn { padding: 12px; border-radius: 12px; border: none; font-weight: 700; font-size: 0.75rem; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 5px; text-transform: uppercase; }
    .btn-main { background: var(--accent); color: #000; }
    .btn-sec { background: #1e293b; color: #fff; border: 1px solid var(--border); }
    .btn-cal { background: var(--secondary); color: #fff; grid-column: span 2; }
    .btn-start { background: var(--success); color: #fff; grid-column: span 2; height: 50px; font-size: 1rem; }
    .btn-stop { background: var(--danger); color: #fff; grid-column: span 2; height: 50px; font-size: 1rem; }

    /* Modal Estilos */
    .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: flex; align-items: center; justify-content: center; z-index: 1000; padding: 20px; }
    .modal-content { background: #1e293b; width: 100%; max-width: 400px; border-radius: 24px; padding: 20px; max-height: 80vh; overflow-y: auto; }
    .vehicle-item { padding: 12px; border-bottom: 1px solid var(--border); cursor: pointer; }
    .vehicle-item:active { background: var(--accent); color: #000; }

    /* Calibración Overlay */
    #calOverlay { position: fixed; inset: 0; background: rgba(10,15,22,0.95); z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
    .cal-circle { width: 120px; height: 120px; border: 8px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 2s linear infinite; margin-bottom: 20px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <div class="header">
    <h1>Roadcheck IRI</h1>
  </div>

  <div class="nav-tabs">
    <button class="nav-btn active" onclick="showScreen('main')">MEDICIÓN</button>
    <button class="nav-btn" onclick="showScreen('history')">HISTORIAL</button>
  </div>

  <div id="screen-main" class="screen">
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-label">IRI MEDIDO</div>
        <div id="val-measured" class="stat-value">0.00</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">IRI CORREGIDO</div>
        <div id="val-corrected" class="stat-value corrected">0.00</div>
      </div>
    </div>

    <div class="map-box">
      <div id="mapMain"></div>
    </div>

    <div class="chart-box">
      <canvas id="accelChart"></canvas>
    </div>

    <div class="controls">
      <button class="btn btn-cal" onclick="startCalibration()">⚙️ CALIBRAR (6s)</button>
      <button class="btn btn-sec" onclick="openGarage()">🚗 GARAJE</button>
      <button class="btn btn-sec" onclick="setSegmentLength()">📏 TRAMO: <span id="lbl-segment">100</span>m</button>
      <button id="btn-toggle" class="btn btn-start" onclick="toggleMeasurement()">▶ INICIAR REGISTRO</button>
    </div>
  </div>

  <div id="screen-history" class="screen hidden">
    <div id="history-map" style="height: 200px; border-radius: 16px; margin-bottom: 10px;"></div>
    <div id="route-list" style="display: flex; flex-direction: column; gap: 8px;">
      </div>
  </div>

  <div id="calOverlay" class="hidden">
    <div class="cal-circle"></div>
    <h2 id="cal-title">CALIBRANDO</h2>
    <p id="cal-desc">Fase 1: Ajustando orientación...</p>
    <div style="width: 200px; height: 10px; background: #334155; border-radius: 5px; margin-top: 15px;">
      <div id="cal-progress" style="width: 0%; height: 100%; background: var(--accent); border-radius: 5px; transition: 0.1s;"></div>
    </div>
  </div>

  <div id="garageModal" class="modal hidden">
    <div class="modal-content">
      <h3 style="margin-bottom: 15px;">Seleccionar Vehículo</h3>
      <div id="vehicle-list"></div>
      <button class="btn btn-sec" style="width:100%; margin-top:15px;" onclick="closeGarage()">CERRAR</button>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
