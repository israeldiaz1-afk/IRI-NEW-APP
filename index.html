<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Roadcheck IRI Pro</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    :root {
      --bg: #0a0f16; --card: #161e2d; --accent: #f59e0b; --text: #f8fafc;
      --safe-bottom: env(safe-area-inset-bottom);
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      margin: 0; font-family: -apple-system, system-ui, sans-serif;
      background: var(--bg); color: var(--text);
      height: 100vh; height: 100dvh; display: flex; flex-direction: column;
      overflow: hidden; padding-top: env(safe-area-inset-top);
    }
    header { 
      padding: 10px; text-align: center; background: var(--card); 
      border-bottom: 1px solid rgba(255,255,255,0.1); 
    }
    h1 { margin: 0; font-size: 1.1rem; color: var(--accent); letter-spacing: 1px; }

    .main-layout {
      flex: 1; display: flex; flex-direction: column; padding: 10px; gap: 10px;
    }

    .stats-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .stat-box { background: var(--card); padding: 12px; border-radius: 12px; text-align: center; }
    .label { font-size: 0.65rem; color: #94a3b8; display: block; margin-bottom: 4px; }
    .val { font-size: 1.6rem; font-weight: 800; font-family: monospace; }

    #map { flex: 1; min-height: 180px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.1); }

    .chart-box { height: 140px; background: var(--card); border-radius: 16px; padding: 8px; }

    .controls {
      display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
      padding-bottom: calc(10px + var(--safe-bottom));
    }
    .btn {
      padding: 14px; border: none; border-radius: 12px; font-weight: 700;
      font-size: 0.8rem; cursor: pointer; transition: 0.2s;
    }
    .btn-main { grid-column: span 2; background: var(--accent); color: #000; font-size: 1rem; }
    .btn-stop { grid-column: span 2; background: #ef4444; color: #fff; font-size: 1rem; }
    .btn-sec { background: #2d3748; color: #fff; }
    .btn-cal { grid-column: span 2; background: #3b82f6; color: #fff; }

    /* Modales */
    .modal {
      position: fixed; inset: 0; background: rgba(0,0,0,0.9);
      display: none; z-index: 1000; padding: 20px; flex-direction: column;
    }
    .modal.active { display: flex; }
    .modal-content {
      background: var(--card); border-radius: 20px; padding: 20px;
      max-height: 80vh; overflow-y: auto; border: 1px solid #334155;
    }
    .v-item {
      padding: 15px; border-bottom: 1px solid #2d3748;
      display: flex; flex-direction: column; gap: 4px;
    }
    .v-item:active { background: var(--accent); color: #000; }
  </style>
</head>
<body>

<header><h1>ROADCHECK IRI</h1></header>

<div class="main-layout">
  <div class="stats-row">
    <div class="stat-box"><span class="label">IRI REGISTRADO</span><span id="iri-raw" class="val">0.00</span></div>
    <div class="stat-box"><span class="label">IRI CORREGIDO</span><span id="iri-corr" class="val" style="color:var(--accent)">0.00</span></div>
  </div>

  <div id="map"></div>

  <div class="chart-box">
    <canvas id="iriChart"></canvas>
  </div>

  <div class="controls">
    <button class="btn btn-cal" id="btn-cal" onclick="startCalibration()">⚙️ CALIBRAR SISTEMA (6s)</button>
    <button class="btn btn-main" id="btn-toggle" onclick="toggleMeasurement()">▶ INICIAR MEDICIÓN</button>
    <button class="btn btn-sec" onclick="openGarage()">🚗 GARAJE</button>
    <button class="btn btn-sec" onclick="cycleSegment()">📏 TRAMO: <span id="seg-val">100</span>m</button>
    <button class="btn btn-sec" style="grid-column: span 2" onclick="alert('Historial próximamente')">📋 VER HISTORIAL</button>
  </div>
</div>

<div id="garage-modal" class="modal">
  <div class="modal-content">
    <h2 style="margin-top:0">Garaje de Vehículos</h2>
    <div id="vehicle-list"></div>
    <button class="btn btn-sec" style="width:100%; margin-top:15px" onclick="closeGarage()">CERRAR</button>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="app.js"></script>
</body>
</html>
