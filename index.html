<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0a0f16"/>
  <title>RoadCheck IRI Pro</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    :root {
      --bg-deep: #0a0f16;
      --bg-card: rgba(18, 25, 35, 0.85);
      --bg-panel: rgba(25, 33, 46, 0.7);
      --accent-primary: #f59e0b;
      --accent-secondary: #3b82f6;
      --accent-danger: #ef4444;
      --accent-success: #10b981;
      --accent-warm: #b91c1c;
      --text-primary: #e2e8f0;
      --text-secondary: #94a3b8;
      --border-glass: rgba(255,255,255,0.08);
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body { height:100%; overflow:hidden; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: radial-gradient(ellipse at top, #1a2332 0%, var(--bg-deep) 70%);
      color: var(--text-primary);
      display: flex;
      justify-content: center;
      align-items: flex-start;
      height: 100vh;
      padding: 8px;
    }
    .app-container {
      width: 100%;
      max-width: 460px;
      background: var(--bg-card);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--border-glass);
      border-radius: 28px;
      padding: 12px 14px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.5);
      display: flex;
      flex-direction: column;
      height: 100%;
      overflow: hidden;
    }
    .app-header {
      flex-shrink: 0;
      text-align: center;
      margin-bottom: 8px;
    }
    .app-logo {
      font-size: 1.2rem;
      font-weight: 800;
      color: var(--accent-primary);
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    .nav-row {
      display: flex;
      gap: 6px;
      margin-top: 6px;
    }
    .nav-btn {
      flex: 1;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border-glass);
      color: var(--text-secondary);
      padding: 8px 10px;
      border-radius: 22px;
      font-size: 0.7rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      transition: all 0.2s;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .main-screen {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 5px;
      overflow-y: auto;
    }
    .iri-indicators {
      display: flex;
      gap: 8px;
    }
    .iri-card {
      flex: 1;
      background: var(--bg-panel);
      border: 1px solid var(--border-glass);
      border-radius: 14px;
      padding: 10px;
      text-align: center;
    }
    .iri-card .label {
      font-size: 0.55rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      opacity: 0.7;
    }
    .iri-card .value {
      font-family: 'JetBrains Mono', monospace;
      font-size: 1.5rem;
      font-weight: 700;
      display: block;
      margin-top: 4px;
    }

    .map-container {
      height: 260px;
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid var(--border-glass);
      background: #0f172a;
      flex-shrink: 0;
      position: relative;
    }
    #mapMeasure { height: 100%; width: 100%; }

    .speed-box {
      position: absolute;
      bottom: 10px;
      right: 10px;
      background: rgba(0, 0, 0, 0.65);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      padding: 6px 14px;
      border-radius: 20px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 1rem;
      font-weight: 700;
      color: #ffffff;
      box-shadow: 0 2px 8px rgba(0,0,0,0.5);
      border: 1px solid rgba(255,255,255,0.15);
      z-index: 500;
    }

    .chart-panel {
      background: var(--bg-panel);
      border: 1px solid var(--border-glass);
      border-radius: 16px;
      padding: 8px;
      height: 179px;
      flex-shrink: 0;
    }
    .chart-panel canvas { width: 100%!important; height: 100%!important; }

    /* Barra de progreso para calibración */
    .progress-bar-container {
      display: flex;
      flex-direction: column;
      gap: 2px;
      margin-top: 2px;
    }
    .progress-bar {
      width: 100%; height: 6px;
      background: rgba(255,255,255,0.1);
      border-radius: 3px;
      overflow: hidden;
    }
    .progress-fill {
      width: 0%; height: 100%;
      background: var(--accent-primary);
      border-radius: 3px;
      transition: width 0.3s;
    }
    .progress-text {
      font-size: 0.6rem;
      color: var(--text-secondary);
      text-align: center;
    }

    .action-buttons {
      display: flex;
      gap: 5px;
      flex-wrap: wrap;
      margin-top: 2px;
    }
    .btn {
      padding: 9px 10px;
      border-radius: 20px;
      border: none;
      font-size: 0.7rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 3px;
      flex: 1;
      min-width: 55px;
      transition: all 0.2s;
      text-transform: uppercase;
      letter-spacing: 0.3px;
      white-space: nowrap;
    }
    .btn-primary { background: linear-gradient(135deg, var(--accent-primary), var(--accent-warm)); color: #0a0f16; }
    .btn-secondary { background: rgba(255,255,255,0.05); color: var(--text-primary); border: 1px solid var(--border-glass); }
    .btn-full { flex: 1 1 100%; }

    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="app-container">
    <div class="app-header">
      <div class="app-logo">ROADCHECK IRI PRO</div>
      <div class="nav-row">
        <button class="nav-btn">🚗 COCHE</button>
        <button class="nav-btn">HISTORIAL</button>
        <button class="nav-btn">VISOR</button>
      </div>
    </div>

    <div class="main-screen">
      <div class="iri-indicators">
        <div class="iri-card"><span class="label">IRI MEDIDO</span><span class="value" id="iriMeasured" style="color:var(--accent-secondary);">---</span></div>
        <div class="iri-card"><span class="label">IRI CORREGIDO</span><span class="value" id="iriCorrected" style="color:var(--accent-primary);">---</span></div>
      </div>

      <!-- MAPA con indicador de velocidad -->
      <div class="map-container">
        <div id="mapMeasure"></div>
        <div class="speed-box" id="speedDisplay">0 km/h</div>
      </div>

      <!-- GRÁFICO -->
      <div class="chart-panel"><canvas id="sensorChart"></canvas></div>

      <!-- BARRA DE PROGRESO DE CALIBRACIÓN -->
      <div id="calibrationStatus" class="progress-bar-container">
        <div class="progress-bar"><div id="calProgressFill" class="progress-fill" style="width:0%;"></div></div>
        <span class="progress-text" id="calStatusText">Calibrando...</span>
      </div>

      <div class="action-buttons">
        <button class="btn btn-secondary" onclick="alert('Ajustes en desarrollo')">⚡ CORR. VELOCIDAD</button>
        <button class="btn btn-secondary" onclick="startCalibration()">📱 CALIBRAR</button>
        <button class="btn btn-primary btn-full" onclick="alert('Medición en desarrollo')">▶ INICIAR MEDICIÓN</button>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script>
    // ========== MAPA + GPS ==========
    const map = L.map('mapMeasure', { zoomControl: false, attributionControl: false }).setView([40.4168, -3.7038], 15);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }).addTo(map);

    let userMarker = null;
    let lastLat = null, lastLng = null;
    const speedBox = document.getElementById('speedDisplay');
    const MIN_SPEED_KMH = 3;
    const MIN_DISTANCE_M = 1.5;

    function updateSpeedDisplay(kmh) {
      speedBox.textContent = (kmh > MIN_SPEED_KMH) ? kmh.toFixed(1) + ' km/h' : '0 km/h';
    }

    function calculateDistance(lat1, lon1, lat2, lon2) {
      const R = 6371000;
      const dLat = (lat2 - lat1) * Math.PI / 180;
      const dLon = (lon2 - lon1) * Math.PI / 180;
      const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2)**2;
      return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }

    function handlePosition(pos) {
      const { latitude, longitude, speed } = pos.coords;
      const kmh = (speed != null) ? speed * 3.6 : 0;
      
      if (!userMarker) {
        userMarker = L.marker([latitude, longitude]).addTo(map);
        map.setView([latitude, longitude], 16);
        lastLat = latitude; lastLng = longitude;
        updateSpeedDisplay(0);
        return;
      }

      updateSpeedDisplay(kmh);

      if (kmh > MIN_SPEED_KMH) {
        const dist = calculateDistance(lastLat, lastLng, latitude, longitude);
        if (dist > MIN_DISTANCE_M) {
          userMarker.setLatLng([latitude, longitude]);
          map.panTo([latitude, longitude]);
          lastLat = latitude; lastLng = longitude;
        }
      }
    }

    if ('geolocation' in navigator) {
      navigator.geolocation.watchPosition(handlePosition, err => speedBox.textContent = 'Sin GPS', {
        enableHighAccuracy: true, maximumAge: 0, timeout: 5000
      });
    }

    // ========== GRÁFICO CON CHART.JS ==========
    const ctx = document.getElementById('sensorChart').getContext('2d');
    const chart = new Chart(ctx, {
      type: 'line',
      data: {
        labels: [],
        datasets: [
          {
            label: 'Acel. Z',
            data: [],
            borderColor: '#3b82f6',
            backgroundColor: 'rgba(59,130,246,0.08)',
            yAxisID: 'y',
            tension: 0.4,
            pointRadius: 0,
            segment: { borderColor: ctx => getAccelColor(ctx.p1.raw || 0) }
          },
          {
            label: 'IRI Corr',
            data: [],
            borderColor: '#f59e0b',
            backgroundColor: 'rgba(245,158,11,0.08)',
            yAxisID: 'y1',
            tension: 0.4,
            pointRadius: 0,
            segment: { borderColor: ctx => getIRIColor(ctx.p1.raw || 0) }
          }
        ]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        animation: false,
        scales: {
          x: { display: false },
          y: { type: 'linear', display: true, position: 'left', min: 0, max: 15, grid: { color: 'rgba(255,255,255,0.03)' }, ticks: { color: '#94a3b8', font: { family: 'JetBrains Mono', size: 10 } } },
          y1: { type: 'linear', display: true, position: 'right', min: 0, max: 10, grid: { drawOnChartArea: false }, ticks: { color: '#94a3b8', font: { family: 'JetBrains Mono', size: 10 } } }
        },
        plugins: { legend: { labels: { color: '#94a3b8', font: { size: 10 } } } }
      }
    });

    function getAccelColor(val) {
      if (val < 0.5) return '#64748b';
      if (val < 2) return '#10b981';
      if (val < 5) return '#f59e0b';
      return '#ef4444';
    }
    function getIRIColor(iri) {
      if (iri <= 2) return '#10b981';
      if (iri <= 4) return '#f59e0b';
      if (iri <= 6) return '#f97316';
      return '#ef4444';
    }

    // Buffers para gráfico (60 puntos máx) y actualización suave
    const MAX_POINTS = 60;
    let accelBuf = [], iriBuf = [];
    let lastChartUpdate = 0;

    function addChartData(accel, iri) {
      // Throttle a ~20 Hz (50ms)
      const now = Date.now();
      if (now - lastChartUpdate < 50) return;
      lastChartUpdate = now;

      accelBuf.push(accel);
      iriBuf.push(iri);
      if (accelBuf.length > MAX_POINTS) { accelBuf.shift(); iriBuf.shift(); }

      chart.data.labels = accelBuf.map((_, i) => i);
      chart.data.datasets[0].data = accelBuf;
      chart.data.datasets[1].data = iriBuf;

      const maxZ = Math.max(...accelBuf, 1);
      const maxIRI = Math.max(...iriBuf, 1);
      chart.options.scales.y.max = Math.ceil(maxZ * 1.2);
      chart.options.scales.y1.max = Math.ceil(maxIRI * 1.2) || 10;
      chart.update('none');
    }

    // Actualización suave de indicadores (cada 100ms)
    let lastIRIUpdate = 0;
    let iriMeasuredDisplay = '---', iriCorrectedDisplay = '---';

    function updateIRIDisplay(iriM, iriC) {
      const now = Date.now();
      if (now - lastIRIUpdate > 100) {
        document.getElementById('iriMeasured').textContent = iriM.toFixed(2);
        document.getElementById('iriCorrected').textContent = iriC.toFixed(2);
        lastIRIUpdate = now;
      }
    }

    // ========== CALIBRACIÓN ==========
    let gravityUnit = null;
    let gravityMagnitude = 9.8;
    let calibrationSamples = [];
    let calibrationStartTime = 0;
    let calibrationActive = false;
    const TOTAL_CAL_TIME = 2000; // 2 segundos

    function startCalibration() {
      calibrationActive = true;
      calibrationSamples = [];
      gravityUnit = null;
      calibrationStartTime = Date.now();

      const statusPanel = document.getElementById('calibrationStatus');
      statusPanel.classList.remove('hidden');
      document.getElementById('calProgressFill').style.width = '0%';
      document.getElementById('calStatusText').textContent = 'Calibrando... no muevas el móvil';
    }

    function finalizeCalibration() {
      if (calibrationSamples.length < 5) {
        calibrationActive = false;
        startCalibration(); // reintentar
        return;
      }

      let mx = 0, my = 0, mz = 0;
      calibrationSamples.forEach(s => { mx += s.x; my += s.y; mz += s.z; });
      mx /= calibrationSamples.length;
      my /= calibrationSamples.length;
      mz /= calibrationSamples.length;
      const mag = Math.sqrt(mx*mx + my*my + mz*mz);
      if (mag < 0.5) {
        calibrationActive = false;
        startCalibration();
        return;
      }
      gravityUnit = { x: mx/mag, y: my/mag, z: mz/mag };
      gravityMagnitude = mag;
      calibrationSamples = [];
      calibrationActive = false;

      document.getElementById('calibrationStatus').classList.add('hidden');
      document.getElementById('calStatusText').textContent = 'Calibración completada';
      console.log('Calibración OK');
    }

    // ========== ACELERÓMETRO ==========
    function processAccelSample(x, y, z) {
      if (calibrationActive) {
        const elapsed = Date.now() - calibrationStartTime;
        const progress = Math.min(100, Math.floor((elapsed / TOTAL_CAL_TIME) * 100));
        document.getElementById('calProgressFill').style.width = progress + '%';

        // Solo aceptar muestras si el dispositivo está quieto
        if (calibrationSamples.length > 0) {
          const last = calibrationSamples[calibrationSamples.length - 1];
          const diff = Math.abs(x - last.x) + Math.abs(y - last.y) + Math.abs(z - last.z);
          if (diff <= 0.3) calibrationSamples.push({x, y, z});
        } else {
          calibrationSamples.push({x, y, z});
        }

        if (elapsed >= TOTAL_CAL_TIME) {
          finalizeCalibration();
        }
        return;
      }

      if (!gravityUnit) return;

      // Restar gravedad
      const dynamicZ = Math.abs(x*gravityUnit.x + y*gravityUnit.y + z*gravityUnit.z - gravityMagnitude);
      const noiseFloor = 0.08;
      const effectiveAccel = dynamicZ < noiseFloor ? 0 : dynamicZ;

      // IRI simulado: como a=2, b=0.5, RMS ≈ effectiveAccel (simplificado)
      const iriMeasured = effectiveAccel * 2 + 0.5;  // fórmula sencilla
      const iriCorrected = iriMeasured; // sin corrección aún

      // Actualizar indicadores (throttleado)
      updateIRIDisplay(iriMeasured, iriCorrected);

      // Añadir al gráfico
      addChartData(effectiveAccel, iriCorrected);
    }

    // Intentar Generic Sensor API
    if ('Accelerometer' in window) {
      try {
        const accel = new Accelerometer({ frequency: 60, includeGravity: true });
        accel.addEventListener('reading', () => {
          processAccelSample(accel.x, accel.y, accel.z);
        });
        accel.addEventListener('error', () => fallbackToDeviceMotion());
        accel.start();
        startCalibration();
      } catch (e) {
        fallbackToDeviceMotion();
      }
    } else {
      fallbackToDeviceMotion();
    }

    function fallbackToDeviceMotion() {
      window.addEventListener('deviceorientation', event => {
        const { x, y, z } = event.accelerationIncludingGravity || { x:0, y:0, z:0 };
        processAccelSample(x, y, z);
      });
      startCalibration();
    }
  </script>
</body>
</html>
