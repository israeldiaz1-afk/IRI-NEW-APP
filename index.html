<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Roadcheck IRI Pro</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root {
            --primary: #f59e0b; --bg: #0f172a; --card: #1e293b; --text: #f8fafc;
            --success: #22c55e; --warning: #facc15; --danger: #ef4444;
        }
        body { font-family: 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        header { padding: 15px; text-align: center; background: var(--card); border-bottom: 2px solid var(--primary); }
        h1 { margin: 0; font-size: 1.2rem; letter-spacing: 2px; color: var(--primary); }
        
        .main-container { flex: 1; display: flex; flex-direction: column; padding: 10px; gap: 10px; overflow-y: auto; }
        
        .grid-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .stat-card { background: var(--card); padding: 15px; border-radius: 12px; text-align: center; border: 1px solid #334155; }
        .stat-val { font-size: 1.8rem; font-weight: bold; display: block; }
        .stat-label { font-size: 0.7rem; color: #94a3b8; text-transform: uppercase; }

        #map { height: 200px; border-radius: 12px; border: 1px solid #334155; }
        .chart-container { height: 150px; background: var(--card); border-radius: 12px; padding: 10px; }

        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding-bottom: 20px; }
        .btn { padding: 15px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; transition: 0.2s; text-transform: uppercase; font-size: 0.8rem; }
        .btn-cal { grid-column: span 2; background: #3b82f6; color: white; }
        .btn-start { grid-column: span 2; background: var(--success); color: white; font-size: 1.1rem; }
        .btn-stop { grid-column: span 2; background: var(--danger); color: white; font-size: 1.1rem; }
        .btn-sec { background: var(--card); color: white; border: 1px solid #475569; }

        /* Modales */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; display: none; padding: 20px; flex-direction: column; }
        .modal.active { display: flex; }
        .modal-content { background: var(--card); border-radius: 20px; padding: 20px; max-height: 80vh; overflow-y: auto; }
        .vehicle-item { padding: 15px; border-bottom: 1px solid #334155; display: flex; justify-content: space-between; }

        /* Overlay Calibración */
        #cal-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 2000; display: none; align-items: center; justify-content: center; text-align: center; }
        .progress-bar { width: 80%; height: 10px; background: #334155; border-radius: 5px; margin-top: 20px; overflow: hidden; }
        #progress-fill { width: 0%; height: 100%; background: var(--primary); transition: 0.1s; }
        
        .hidden { display: none; }
    </style>
</head>
<body>

<header><h1>ROADCHECK IRI</h1></header>

<div id="screen-main" class="main-container">
    <div class="grid-stats">
        <div class="stat-card">
            <span class="stat-label">IRI Registrado</span>
            <span id="val-iri-raw" class="stat-val">0.00</span>
        </div>
        <div class="stat-card">
            <span class="stat-label">IRI Corregido</span>
            <span id="val-iri-corr" class="stat-val" style="color: var(--primary)">0.00</span>
        </div>
    </div>

    <div id="map"></div>

    <div class="chart-container">
        <canvas id="liveChart"></canvas>
    </div>

    <div class="controls">
        <button class="btn btn-cal" onclick="initCalibration()">⚙️ Iniciar Calibración (6s)</button>
        <button id="btn-record" class="btn btn-start" onclick="toggleRecording()">▶ Iniciar Registro</button>
        <button class="btn btn-sec" onclick="openGarage()">🚗 Garaje</button>
        <button class="btn btn-sec" onclick="openHistory()">📋 Historial</button>
        <button class="btn btn-sec" style="grid-column: span 2;" onclick="setSegment()">📏 Tramo: <span id="lbl-segment">100</span>m</button>
    </div>
</div>

<div id="modal-garage" class="modal">
    <div class="modal-content">
        <h3>Seleccionar Vehículo</h3>
        <div id="vehicle-list"></div>
        <button class="btn btn-sec" style="width:100%; margin-top:20px" onclick="closeModal('modal-garage')">Cerrar</button>
    </div>
</div>

<div id="cal-overlay">
    <div>
        <h2 id="cal-title">Fase 1/2</h2>
        <p id="cal-msg">Mantén el coche quieto y el teléfono fijo...</p>
        <div class="progress-bar"><div id="progress-fill"></div></div>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
