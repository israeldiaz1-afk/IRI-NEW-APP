<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0a0f16"/>
  <title>RoadCheck IRI Pro</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    :root {
      --bg-deep: #0a0f16;
      --bg-card: rgba(18, 25, 35, 0.85);
      --bg-panel: rgba(25, 33, 46, 0.7);
      --accent-primary: #f59e0b;
      --accent-secondary: #3b82f6;
      --accent-danger: #ef4444;
      --accent-success: #10b981;
      --accent-warm: #b91c1c;
      --text-primary: #e2e8f0;
      --text-secondary: #94a3b8;
      --border-glass: rgba(255,255,255,0.08);
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body { height:100%; overflow:hidden; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: radial-gradient(ellipse at top, #1a2332 0%, var(--bg-deep) 70%);
      color: var(--text-primary);
      display: flex;
      justify-content: center;
      align-items: flex-start;
      height: 100vh;
      padding: 8px;
    }
    .app-container {
      width: 100%;
      max-width: 460px;
      background: var(--bg-card);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--border-glass);
      border-radius: 28px;
      padding: 12px 14px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.5);
      display: flex;
      flex-direction: column;
      height: 100%;
      overflow: hidden;
    }
    .app-header {
      flex-shrink: 0;
      text-align: center;
      margin-bottom: 8px;
    }
    .app-logo {
      font-size: 1.2rem;
      font-weight: 800;
      color: var(--accent-primary);
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    .nav-row {
      display: flex;
      gap: 6px;
      margin-top: 6px;
    }
    .nav-btn {
      flex: 1;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border-glass);
      color: var(--text-secondary);
      padding: 8px 10px;
      border-radius: 22px;
      font-size: 0.7rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      transition: all 0.2s;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .main-screen {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 5px;
      overflow-y: auto;
    }
    .iri-indicators {
      display: flex;
      gap: 8px;
    }
    .iri-card {
      flex: 1;
      background: var(--bg-panel);
      border: 1px solid var(--border-glass);
      border-radius: 14px;
      padding: 10px;
      text-align: center;
    }
    .iri-card .label {
      font-size: 0.55rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      opacity: 0.7;
    }
    .iri-card .value {
      font-family: 'JetBrains Mono', monospace;
      font-size: 1.5rem;
      font-weight: 700;
      display: block;
      margin-top: 4px;
    }

    .map-container {
      height: 260px;
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid var(--border-glass);
      background: #0f172a;
      flex-shrink: 0;
      position: relative;
    }
    #mapMeasure { height: 100%; width: 100%; }

    .speed-box {
      position: absolute;
      bottom: 10px;
      right: 10px;
      background: rgba(0, 0, 0, 0.65);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      padding: 6px 14px;
      border-radius: 20px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 1rem;
      font-weight: 700;
      color: #ffffff;
      box-shadow: 0 2px 8px rgba(0,0,0,0.5);
      border: 1px solid rgba(255,255,255,0.15);
      z-index: 500;
    }

    .chart-panel {
      background: var(--bg-panel);
      border: 1px solid var(--border-glass);
      border-radius: 16px;
      padding: 8px;
      height: 179px;
      flex-shrink: 0;
    }
    .chart-panel canvas { width: 100%!important; height: 100%!important; }
    .action-buttons {
      display: flex;
      gap: 5px;
      flex-wrap: wrap;
      margin-top: 2px;
    }
    .btn {
      padding: 9px 10px;
      border-radius: 20px;
      border: none;
      font-size: 0.7rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 3px;
      flex: 1;
      min-width: 55px;
      transition: all 0.2s;
      text-transform: uppercase;
      letter-spacing: 0.3px;
      white-space: nowrap;
    }
    .btn-primary { background: linear-gradient(135deg, var(--accent-primary), var(--accent-warm)); color: #0a0f16; }
    .btn-secondary { background: rgba(255,255,255,0.05); color: var(--text-primary); border: 1px solid var(--border-glass); }
    .btn-full { flex: 1 1 100%; }
  </style>
</head>
<body>
  <div class="app-container">
    <div class="app-header">
      <div class="app-logo">ROADCHECK IRI PRO</div>
      <div class="nav-row">
        <button class="nav-btn">🚗 COCHE</button>
        <button class="nav-btn">HISTORIAL</button>
        <button class="nav-btn">VISOR</button>
      </div>
    </div>

    <div class="main-screen">
      <div class="iri-indicators">
        <div class="iri-card"><span class="label">IRI MEDIDO</span><span class="value" style="color:var(--accent-secondary);">---</span></div>
        <div class="iri-card"><span class="label">IRI CORREGIDO</span><span class="value" style="color:var(--accent-primary);">---</span></div>
      </div>

      <!-- MAPA con indicador de velocidad -->
      <div class="map-container">
        <div id="mapMeasure"></div>
        <div class="speed-box" id="speedDisplay">0 km/h</div>
      </div>

      <!-- GRÁFICO (aún con datos de ejemplo) -->
      <div class="chart-panel"><canvas id="sensorChart"></canvas></div>

      <div class="action-buttons">
        <button class="btn btn-secondary">⚡ CORR. VELOCIDAD</button>
        <button class="btn btn-secondary">📱 CALIBRAR</button>
        <button class="btn btn-primary btn-full">▶ INICIAR MEDICIÓN</button>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script>
    // ========== MAPA ==========
    const map = L.map('mapMeasure', { zoomControl: false, attributionControl: false }).setView([40.4168, -3.7038], 15);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }).addTo(map);

    let userMarker = null;
    let lastLat = null;
    let lastLng = null;
    const speedBox = document.getElementById('speedDisplay');
    const MIN_SPEED_KMH = 3;          // Solo considerar movimiento a partir de 3 km/h
    const MIN_DISTANCE_M = 1.5;       // Ignorar desplazamientos menores de 1.5 metros

    function updateSpeedDisplay(kmh) {
      if (kmh > MIN_SPEED_KMH) {
        speedBox.textContent = kmh.toFixed(1) + ' km/h';
        speedBox.style.visibility = 'visible';
      } else {
        speedBox.textContent = '0 km/h';
        speedBox.style.visibility = 'visible';
      }
    }

    function calculateDistance(lat1, lon1, lat2, lon2) {
      const R = 6371000;
      const dLat = (lat2 - lat1) * Math.PI / 180;
      const dLon = (lon2 - lon1) * Math.PI / 180;
      const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2)**2;
      return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }

    function handlePosition(pos) {
      const { latitude, longitude, speed } = pos.coords;
      const kmh = (speed != null) ? speed * 3.6 : 0;
      
      // Primera ubicación: centrar mapa y poner marcador
      if (!userMarker) {
        userMarker = L.marker([latitude, longitude]).addTo(map);
        map.setView([latitude, longitude], 16);
        lastLat = latitude;
        lastLng = longitude;
        updateSpeedDisplay(0);
        return;
      }

      // Actualizar velocidad siempre, pero solo mover si se cumplen umbrales
      updateSpeedDisplay(kmh);

      if (kmh > MIN_SPEED_KMH) {
        const dist = calculateDistance(lastLat, lastLng, latitude, longitude);
        if (dist > MIN_DISTANCE_M) {
          userMarker.setLatLng([latitude, longitude]);
          map.panTo([latitude, longitude]);
          lastLat = latitude;
          lastLng = longitude;
        }
      }
    }

    function handleError(err) {
      console.warn('GPS Error:', err.message);
      speedBox.textContent = 'GPS no disponible';
    }

    // Iniciar GPS
    if ('geolocation' in navigator) {
      navigator.geolocation.watchPosition(handlePosition, handleError, {
        enableHighAccuracy: true,
        maximumAge: 0,
        timeout: 5000
      });
    } else {
      speedBox.textContent = 'GPS no soportado';
    }

    // ========== GRÁFICO (ejemplo) ==========
    const labels = Array.from({length: 40}, (_, i) => i);
    const accelData = Array.from({length: 40}, () => Math.random() * 10);
    const iriData = Array.from({length: 40}, () => Math.random() * 6);

    function getAccelColor(val) {
      if (val < 0.5) return '#64748b';
      if (val < 2) return '#10b981';
      if (val < 5) return '#f59e0b';
      return '#ef4444';
    }
    function getIRIColor(iri) {
      if (iri <= 2) return '#10b981';
      if (iri <= 4) return '#f59e0b';
      if (iri <= 6) return '#f97316';
      return '#ef4444';
    }

    const ctx = document.getElementById('sensorChart').getContext('2d');
    new Chart(ctx, {
      type: 'line',
      data: {
        labels: labels,
        datasets: [
          {
            label: 'Acel. Z',
            data: accelData,
            borderColor: '#3b82f6',
            backgroundColor: 'rgba(59,130,246,0.08)',
            yAxisID: 'y',
            tension: 0.4,
            pointRadius: 0,
            segment: { borderColor: ctx => getAccelColor(ctx.p1.raw || 0) }
          },
          {
            label: 'IRI Corr',
            data: iriData,
            borderColor: '#f59e0b',
            backgroundColor: 'rgba(245,158,11,0.08)',
            yAxisID: 'y1',
            tension: 0.4,
            pointRadius: 0,
            segment: { borderColor: ctx => getIRIColor(ctx.p1.raw || 0) }
          }
        ]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        animation: false,
        scales: {
          x: { display: false },
          y: { type: 'linear', display: true, position: 'left', min: 0, max: 15, grid: { color: 'rgba(255,255,255,0.03)' }, ticks: { color: '#94a3b8', font: { family: 'JetBrains Mono', size: 10 } } },
          y1: { type: 'linear', display: true, position: 'right', min: 0, max: 10, grid: { drawOnChartArea: false }, ticks: { color: '#94a3b8', font: { family: 'JetBrains Mono', size: 10 } } }
        },
        plugins: { legend: { labels: { color: '#94a3b8', font: { size: 10 } } } }
      }
    });
  </script>
</body>
</html>
