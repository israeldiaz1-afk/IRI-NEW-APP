<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0a0f16"/>
  <title>RoadCheck IRI Pro</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-deep: #0a0f16;
      --bg-card: rgba(18, 25, 35, 0.85);
      --bg-panel: rgba(25, 33, 46, 0.7);
      --accent-primary: #f59e0b;
      --accent-secondary: #3b82f6;
      --accent-danger: #ef4444;
      --accent-success: #10b981;
      --accent-warm: #b91c1c;
      --text-primary: #e2e8f0;
      --text-secondary: #94a3b8;
      --border-glass: rgba(255,255,255,0.08);
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body { height:100%; overflow:hidden; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: radial-gradient(ellipse at top, #1a2332 0%, var(--bg-deep) 70%);
      color: var(--text-primary);
      display: flex;
      justify-content: center;
      align-items: flex-start;
      height: 100vh;
      padding: 8px;
    }
    .app-container {
      width: 100%;
      max-width: 460px;
      background: var(--bg-card);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--border-glass);
      border-radius: 28px;
      padding: 12px 14px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.5);
      display: flex;
      flex-direction: column;
      height: 100%;
      overflow: hidden;
    }
    .app-header {
      flex-shrink: 0;
      text-align: center;
      margin-bottom: 8px;
    }
    .app-logo {
      font-size: 1.3rem;
      font-weight: 800;
      color: var(--accent-primary);
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    .nav-row {
      display: flex;
      gap: 6px;
      margin-top: 8px;
    }
    .nav-btn {
      flex: 1;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border-glass);
      color: var(--text-secondary);
      padding: 10px 12px;
      border-radius: 22px;
      font-size: 0.75rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      transition: all 0.2s;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .main-screen {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 6px;
      overflow-y: auto;
    }
    .iri-indicators {
      display: flex;
      gap: 10px;
    }
    .iri-card {
      flex: 1;
      background: var(--bg-panel);
      border: 1px solid var(--border-glass);
      border-radius: 16px;
      padding: 12px;
      text-align: center;
    }
    .iri-card .label {
      font-size: 0.6rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      opacity: 0.7;
    }
    .iri-card .value {
      font-family: 'JetBrains Mono', monospace;
      font-size: 1.8rem;
      font-weight: 700;
      display: block;
      margin-top: 4px;
    }
    .secondary-metrics {
      display: flex;
      justify-content: space-around;
      font-size: 0.7rem;
      opacity: 0.9;
      padding: 4px 0;
    }
    .placeholder-box {
      background: var(--bg-panel);
      border: 1px solid var(--border-glass);
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.9rem;
      color: var(--text-secondary);
    }
    .map-placeholder {
      height: 225px;
      flex-shrink: 0;
    }
    .chart-placeholder {
      height: 180px;
      flex-shrink: 0;
    }

    /* Botones pegados al gráfico */
    .action-buttons {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-top: 0;  /* pegado al gráfico */
    }
    .btn {
      padding: 10px 12px;
      border-radius: 22px;
      border: none;
      font-size: 0.75rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      flex: 1;
      min-width: 60px;
      transition: all 0.2s;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      white-space: nowrap;
    }
    .btn-primary { background: linear-gradient(135deg, var(--accent-primary), var(--accent-warm)); color: #0a0f16; }
    .btn-secondary { background: rgba(255,255,255,0.05); color: var(--text-primary); border: 1px solid var(--border-glass); }
    .btn-full { flex: 1 1 100%; }
  </style>
</head>
<body>
  <div class="app-container">
    <div class="app-header">
      <div class="app-logo">ROADCHECK IRI PRO</div>
      <div class="nav-row">
        <button class="nav-btn">🚗 COCHE</button>
        <button class="nav-btn">HISTORIAL</button>
        <button class="nav-btn">VISOR</button>
      </div>
    </div>

    <div class="main-screen">
      <div class="iri-indicators">
        <div class="iri-card"><span class="label">IRI MEDIDO</span><span class="value" style="color:var(--accent-secondary);">---</span></div>
        <div class="iri-card"><span class="label">IRI CORREGIDO</span><span class="value" style="color:var(--accent-primary);">---</span></div>
      </div>
      <div class="secondary-metrics">
        <span>Vel: ---</span>
        <span>Dist: 0 m</span>
      </div>
      <div class="placeholder-box map-placeholder">MAPA (225 px)</div>
      <div class="placeholder-box chart-placeholder">GRÁFICO (180 px)</div>

      <!-- Botones pegados justo debajo del gráfico -->
      <div class="action-buttons">
        <button class="btn btn-secondary">⚡ CORR. VELOCIDAD</button>
        <button class="btn btn-secondary">📱 CALIBRAR</button>
        <button class="btn btn-primary btn-full">▶ INICIAR MEDICIÓN</button>
      </div>
    </div>
  </div>
</body>
</html>
